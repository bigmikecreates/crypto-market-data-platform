name: Deploy MkDocs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          pip install -e .[docs]

      - name: Build MkDocs user guide
        run: |
          mkdocs build --strict

      - name: Copy Docsify API reference into site
        run: |
          mkdir -p site/reference/
          cp docs/reference/index.html site/reference/index.html
          cp docs/reference/*.md site/reference/

      - name: Deploy built site to gh-pages
        uses: peaceiris/actions-gh-pages@v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
