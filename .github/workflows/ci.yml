name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # ── Standard tests (no cloud dependencies) ───────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[test,lint]"

      - name: Lint
        run: ruff check src/ tests/ scripts/

      - name: Format check
        run: ruff format --check src/ tests/ scripts/

      - name: Type check
        run: mypy src/

      - name: Test
        run: |
          mkdir -p reports
          pytest \
            --junitxml=reports/junit.xml \
            --cov --cov-report=term-missing --cov-report=xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Azure integration tests (Azurite emulator, no real Azure account) ────
  test-azure:
    runs-on: ubuntu-latest

    services:
      azurite:
        image: mcr.microsoft.com/azure-storage/azurite:3.34.0
        ports:
          - "10000:10000"
        options: >-
          --health-cmd "nc -z 127.0.0.1 10000 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      # The devstoreaccount1 key is Azurite's publicly documented default — not a secret.
      AZURITE_CONNECTION_STRING: >-
        DefaultEndpointsProtocol=http;
        AccountName=devstoreaccount1;
        AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;
        BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1
      # DuckDB's azure extension reads this env var to configure the connection.
      AZURE_STORAGE_CONNECTION_STRING: >-
        DefaultEndpointsProtocol=http;
        AccountName=devstoreaccount1;
        AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;
        BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (including adlfs)
        run: |
          pip install -e ".[test,azure]"

      - name: Wait for Azurite to be ready
        run: |
          timeout 60 bash -c \
            'until curl -sf http://127.0.0.1:10000/devstoreaccount1; do sleep 1; done'

      - name: Run mock-based Azure unit tests
        run: |
          pytest tests/storage/test_azure_writer.py -v --tb=short

      - name: Run Azurite integration tests
        run: |
          pytest tests/integration/ -m azure_integration -v --tb=short
