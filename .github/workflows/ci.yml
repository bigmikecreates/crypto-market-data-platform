name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # ── Standard tests (no cloud dependencies) ───────────────────────────────
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[test,lint]"

      - name: Lint
        run: ruff check src/ tests/ scripts/

      - name: Format check
        run: ruff format --check src/ tests/ scripts/

      - name: Type check
        run: mypy src/

      - name: Test
        run: |
          mkdir -p reports
          pytest \
            --junitxml=reports/junit.xml \
            --cov --cov-report=term-missing --cov-report=xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Frontend (build + lint) ─────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  # ── Azure integration tests (Azurite emulator, no real Azure account) ────
  test-azure:
    runs-on: ubuntu-latest

    services:
      azurite:
        image: mcr.microsoft.com/azure-storage/azurite:3.34.0
        ports:
          - "10000:10000"
          - "10001:10001"
          - "10002:10002"
        options: >-
          --health-cmd "nc -z 127.0.0.1 10000 || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
        command: >
          azurite
          --blobHost 0.0.0.0
          --queueHost 0.0.0.0
          --tableHost 0.0.0.0

    env:
      AZURE_STORAGE_CONNECTION_STRING: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://127.0.0.1:10000/devstoreaccount1;QueueEndpoint=http://127.0.0.1:10001/devstoreaccount1;TableEndpoint=http://127.0.0.1:10002/devstoreaccount1"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies (including adlfs)
        run: |
          pip install -e ".[test,azure]"

      - name: Wait for Azurite to be ready
        run: |
          for i in {1..60}; do
            if timeout 1 bash -c "</dev/tcp/127.0.0.1/10000" 2>/dev/null; then
              echo "Azurite is ready"
              exit 0
            fi
            echo "Waiting for Azurite..."
            sleep 1
          done
          echo "Azurite did not become ready in time"
          exit 1

      - name: Run mock-based Azure unit tests
        run: |
          pytest tests/storage/test_azure_placeholder.py tests/storage/test_azure_writer.py -v --tb=short

      - name: Run Azurite integration tests
        run: |
          pytest tests/integration/ -m azure_integration -v --tb=short
