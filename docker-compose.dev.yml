services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "8050:8050"
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    environment:
      - CRMD_DATA_DIR=/app/data
      - CRMD_API_KEY=${CRMD_API_KEY:-}
      - CRMD_CORS_ORIGINS=${CRMD_CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:8050/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  fetcher:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      crmd fetch --mdt ohlcv
                 --symbol ${CRMD_FETCH_SYMBOL:-BTC/USDT}
                 --timeframe ${CRMD_FETCH_TIMEFRAME:-1h}
                 --provider ${CRMD_FETCH_PROVIDER:-bitfinex}
                 ${CRMD_FETCH_SINCE_LAST:+--since-last}
                 ${CRMD_FETCH_FOLLOW:+--follow ${CRMD_FETCH_FOLLOW}}
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    environment:
      - CRMD_DATA_DIR=/app/data
      - CRMD_API_URL=http://backend:8050
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8050
    depends_on:
      - backend
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
