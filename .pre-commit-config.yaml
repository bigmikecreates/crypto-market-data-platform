# Pre-commit hooks — run `pre-commit install` once to enable.
# Mirrors the CI Lint + Format check steps so formatting breaks (like the
# one that turned CI red) are caught before they reach a commit.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix]
      - id: ruff-format
        name: ruff (format)
