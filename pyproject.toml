[project]
name = "crypto_market_data_platform"
version = "0.1.0"
requires-python = ">=3.12"
description = "Local-first crypto market data ingestion, validation, storage, and query platform."
dependencies = [
    "pandas",
    "polars",
    "pyarrow",
    "duckdb",
    "pydantic",
    "typer",
    "fastapi",
    "uvicorn[standard]",
]

[project.optional-dependencies]
test = [
    "pytest"
]
lint = [
    "ruff",
    "mypy",
    "pandas-stubs",
    "pyarrow-stubs",
]
docs = [
    "mkdocs-material"
]

[project.scripts]
cmpd = "crypto_market_data_platform.cli.main:app"

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]