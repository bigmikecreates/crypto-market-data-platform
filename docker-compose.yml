services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8050:8050"
    volumes:
      - data:/data
    environment:
      - CRMD_API_KEY=${CRMD_API_KEY:-}
      - CRMD_DATA_DIR=/data
    restart: unless-stopped
    healthcheck:
      test: python -c "import urllib.request; urllib.request.urlopen('http://localhost:8050/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  fetcher:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      crmd fetch --mdt ohlcv
                 --symbol ${CRMD_FETCH_SYMBOL:-BTC/USDT}
                 --timeframe ${CRMD_FETCH_TIMEFRAME:-1h}
                 --provider ${CRMD_FETCH_PROVIDER:-bitfinex}
                 ${CRMD_FETCH_SINCE_LAST:+--since-last}
                 ${CRMD_FETCH_FOLLOW:+--follow ${CRMD_FETCH_FOLLOW}}
    volumes:
      - data:/data
    environment:
      - CRMD_DATA_DIR=/data
      - CRMD_API_URL=http://backend:8050
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:8050
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  reverse-proxy:
    build:
      context: ./nginx
    profiles:
      - reverse-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CRMD_CERT_DIR:-./certs}:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: "0.25"

volumes:
  data:
