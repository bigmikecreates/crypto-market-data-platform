services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8050:8050"
    volumes:
      - data:/data
    environment:
      - CRMD_API_KEY=${CRMD_API_KEY:-}
      - CRMD_DATA_DIR=/data
    restart: unless-stopped

  fetcher:
    build:
      context: .
      dockerfile: Dockerfile
    command: >
      crmd fetch --mdt ohlcv
                 --symbol ${CRMD_FETCH_SYMBOL:-BTC/USDT}
                 --timeframe ${CRMD_FETCH_TIMEFRAME:-1h}
                 --provider ${CRMD_FETCH_PROVIDER:-bitfinex}
                 ${CRMD_FETCH_SINCE_LAST:+--since-last}
                 ${CRMD_FETCH_FOLLOW:+--follow ${CRMD_FETCH_FOLLOW}}
    volumes:
      - data:/data
    environment:
      - CRMD_DATA_DIR=/data
      - CRMD_API_URL=http://backend:8050
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE_URL=http://localhost:8050
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  data:
